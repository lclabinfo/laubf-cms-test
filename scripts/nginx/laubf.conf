# nginx config for LA UBF — website + CMS admin
# Copy to /etc/nginx/sites-available/laubf and symlink to sites-enabled:
#   sudo cp scripts/nginx/laubf.conf /etc/nginx/sites-available/laubf
#   sudo ln -sf /etc/nginx/sites-available/laubf /etc/nginx/sites-enabled/laubf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d laubf.lclab.io -d admin.laubf.lclab.io
#
# After certbot runs, it will auto-add the SSL blocks (listen 443, certs, redirect).

# Website: laubf.lclab.io
server {
    listen 80;
    server_name laubf.lclab.io;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# CMS Admin: admin.laubf.lclab.io
server {
    listen 80;
    server_name admin.laubf.lclab.io;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
